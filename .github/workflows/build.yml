name: build

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: pytest -q

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - name: Build .deb
        run: bash packaging/linux/build_deb.sh
      - name: Smoke-test frozen binary
        run: |
          python - <<'PY'
          from fpdf import FPDF
          p = FPDF()
          for i in range(1, 6):
              p.add_page(); p.set_font("Helvetica", size=48); p.cell(0, 60, f"P{i}")
          p.output("/tmp/s.pdf")
          PY
          ./build/dist/pdfpixel/pdfpixel --pages 2-4 /tmp/s.pdf
          test "$(ls /tmp/s | tr '\n' ' ')" = "2.png 3.png 4.png "
          echo "smoke OK"
      - uses: actions/upload-artifact@v4
        with:
          name: pdfpixel-deb
          path: build/dist/*.deb

  # build-windows / build-macos jobs are added in Phases 3 and 4.

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
