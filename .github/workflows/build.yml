name: build

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: pytest -q

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - name: Build .deb
        run: bash packaging/linux/build_deb.sh
      - name: Smoke-test frozen binary
        run: |
          python packaging/make_sample_pdf.py /tmp/s.pdf 5
          ./build/dist/pdfpixel/pdfpixel --pages 2-4 /tmp/s.pdf
          test "$(ls /tmp/s | tr '\n' ' ')" = "2.png 3.png 4.png "
          echo "smoke OK"
      - uses: actions/upload-artifact@v4
        with:
          name: pdfpixel-deb
          path: build/dist/*.deb

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: choco install innosetup -y --no-progress
      - name: Build installer
        run: powershell -ExecutionPolicy Bypass -File packaging\windows\build_exe.ps1
      # Code signing (optional) — enable by adding the WINDOWS_CERT_* secrets:
      # - name: Sign installer
      #   if: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
      #   run: signtool sign /f cert.pfx /p ${{ secrets.WINDOWS_CERT_PASSWORD }} ...
      - name: Smoke-test frozen exe
        shell: pwsh
        run: |
          python packaging/make_sample_pdf.py s.pdf 5
          Start-Process -FilePath ".\build\dist\pdfpixel\pdfpixel.exe" -ArgumentList "--pages","2-4","s.pdf" -Wait -NoNewWindow
          if (-not (Test-Path "s\2.png")) { throw "smoke failed" }
          Write-Host "smoke OK"
      - uses: actions/upload-artifact@v4
        with:
          name: pdfpixel-exe
          path: build/dist/pdfpixel-setup.exe

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - name: Build .dmg
        run: bash packaging/macos/build_dmg.sh
      # Codesign + notarize (optional) — enable with the APPLE_* secrets:
      # - name: Sign & notarize
      #   if: ${{ secrets.APPLE_ID != '' }}
      #   run: |
      #     codesign --deep --sign "$APPLE_DEV_ID" build/dist/pdfpixel/pdfpixel
      #     xcrun notarytool submit build/dist/*.dmg --apple-id "$APPLE_ID" --wait
      - name: Smoke-test frozen binary
        run: |
          python packaging/make_sample_pdf.py /tmp/s.pdf 5
          ./build/dist/pdfpixel/pdfpixel --pages 2-4 /tmp/s.pdf
          test "$(ls /tmp/s | tr '\n' ' ')" = "2.png 3.png 4.png "
          echo "smoke OK"
      - uses: actions/upload-artifact@v4
        with:
          name: pdfpixel-dmg
          path: build/dist/*.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for action-gh-release to create the Release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
