name: build

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: pytest -q

  build-linux:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest      # x86_64 / amd64
            arch: amd64
          - runner: ubuntu-24.04-arm   # GitHub-hosted aarch64 runner
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      # Build inside a Debian 11 (glibc 2.31) container so the frozen binary
      # runs on Ubuntu 20.04+/Debian 11+/Fedora/RHEL 8+/etc. Docker pulls the
      # debian:11 image matching the runner's arch, so the same script yields
      # native amd64 and arm64 artifacts (.deb, .rpm, universal .AppImage).
      - name: Build .deb + .rpm + AppImage (old-glibc container)
        run: bash packaging/linux/build_in_container.sh debian:11
      - name: Smoke-test frozen binary
        run: |
          ./build/dist/pdfpixel/pdfpixel --version
      - uses: actions/upload-artifact@v4
        with:
          name: pdfpixel-linux-${{ matrix.arch }}
          path: |
            build/dist/*.deb
            build/dist/*.rpm
            build/dist/*.AppImage

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: choco install innosetup -y --no-progress
      - name: Build installer
        run: powershell -ExecutionPolicy Bypass -File packaging\windows\build_exe.ps1
      # Code signing (optional) — enable by adding the WINDOWS_CERT_* secrets:
      # - name: Sign installer
      #   if: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
      #   run: signtool sign /f cert.pfx /p ${{ secrets.WINDOWS_CERT_PASSWORD }} ...
      - name: Smoke-test frozen exe
        shell: pwsh
        run: |
          python packaging/make_sample_pdf.py s.pdf 5
          Start-Process -FilePath ".\build\dist\pdfpixel\pdfpixel.exe" -ArgumentList "--pages","2-4","s.pdf" -Wait -NoNewWindow
          if (-not (Test-Path "s\2.png")) { throw "smoke failed" }
          Write-Host "smoke OK"
      - uses: actions/upload-artifact@v4
        with:
          name: pdfpixel-exe
          path: build/dist/pdfpixel-setup.exe

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - name: Build .dmg
        run: bash packaging/macos/build_dmg.sh
      # Codesign + notarize (optional) — enable with the APPLE_* secrets:
      # - name: Sign & notarize
      #   if: ${{ secrets.APPLE_ID != '' }}
      #   run: |
      #     codesign --deep --sign "$APPLE_DEV_ID" build/dist/pdfpixel/pdfpixel
      #     xcrun notarytool submit build/dist/*.dmg --apple-id "$APPLE_ID" --wait
      - name: Smoke-test frozen binary
        run: |
          python packaging/make_sample_pdf.py /tmp/s.pdf 5
          ./build/dist/pdfpixel/pdfpixel --pages 2-4 /tmp/s.pdf
          test "$(ls /tmp/s | tr '\n' ' ')" = "2.png 3.png 4.png "
          echo "smoke OK"
      - uses: actions/upload-artifact@v4
        with:
          name: pdfpixel-dmg
          path: build/dist/*.dmg

  publish-pypi:
    # Publish the pure-Python package to PyPI on tagged releases so anyone can
    # `pip install pdfpixel` (or `pipx install pdfpixel`) on any distro.
    # Uses PyPI Trusted Publishing (OIDC) — NO API-token secret required.
    # One-time setup before the first tag: create a "pending publisher" at
    # https://pypi.org/manage/account/publishing/ with
    #   project: pdfpixel | owner: parikhvedant2003 | repo: PDFPixel
    #   workflow: build.yml | environment: pypi
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for action-gh-release to create the Release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
